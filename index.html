<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chatbot DSA</title>

  <script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.10/libs/oversea/index.js"></script>
</head>

<body>

<h2>🤖 Chatbot Cấu trúc dữ liệu</h2>

<div id="chat" style="height:600px;"></div>

<script>
  new CozeWebSDK.WebChatClient({
    config: {
      bot_id: '7628115867796308021'
    },
    componentProps: {
      title: 'Chatbot DSA'
    },
    el: document.getElementById('chat'),
    ui: {
      base: {
        layout: 'inline'
      }
    }
  });
</script>

</body>
</html>
